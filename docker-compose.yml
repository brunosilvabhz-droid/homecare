services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-impactocare}
      POSTGRES_USER: ${POSTGRES_USER:-impactocare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-impactocare}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: ./backend
    env_file: .env
    ports: ["${API_BIND:-0.0.0.0}:${API_PORT:-8000}:8000"]
    depends_on:
      db: {condition: service_healthy}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
  automation:
    build: ./backend
    env_file: .env
    depends_on:
      db: {condition: service_healthy}
      api: {condition: service_started}
    restart: unless-stopped
    command: python -m app.automation_worker
  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    ports: ["${WEB_BIND:-0.0.0.0}:${WEB_PORT:-5173}:80"]
    depends_on: [api]
volumes:
  postgres_data:
